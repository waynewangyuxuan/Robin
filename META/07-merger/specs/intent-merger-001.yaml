spec_id: intent-merger-001
type: intent
state: active

intent:
  summary: "Consolidate N review sub-verdicts into one merged verdict with a composed git commit message for Committer."
  detail: |
    Takes all Reviewer verdicts for a batch and merges them into a
    single verdict (fail if any reviewer failed; warn-aware; observation
    aggregation). Composes the commit message that Committer will use
    verbatim.

    Merger does not re-run review logic and does not re-evaluate code.
    Purely a reducer over existing verdicts.

