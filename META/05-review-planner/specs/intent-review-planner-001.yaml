spec_id: intent-review-planner-001
type: intent
state: active

intent:
  summary: "Given a batch's change artifacts, decide which domain-specific reviewer playbooks to run."
  detail: |
    Meta-agent that selects which reviewers run for a batch.
    `code-quality` is always-on; domain-specific reviewers
    (frontend-a11y, backend-api, db-schema, etc.) are added based on
    what the batch touches.

    Emits a review plan that the kernel uses to dispatch Reviewer
    instances in parallel. This agent embodies Robin's posture that
    only the review stage has domain specialization today — and it
    achieves domain awareness by delegation, not by the kernel
    "knowing" domains.

