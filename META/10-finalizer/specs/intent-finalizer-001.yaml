spec_id: intent-finalizer-001
type: intent
state: active

intent:
  summary: "Generate the end-of-run delivery bundle (.ai-robin/DELIVERY.md) summarizing what was built vs degraded."
  detail: |
    Finalizer runs on `all_complete`. It scans the ledger and reads
    intent specs to compose a human-facing delivery summary:

    - milestones delivered
    - milestones degraded (with pointers to context-degraded-*.yaml)
    - known limitations / agent-proxy decisions that need user review
    - suggested next steps

    Finalizer does not modify application code — only writes
    `DELIVERY.md`. It is the last touchpoint before a Robin run ends,
    and the primary read surface for the user when they come back.

