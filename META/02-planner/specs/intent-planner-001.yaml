spec_id: intent-planner-001
type: intent
state: active

intent:
  summary: "Turn Intake's specs into an executable plan: milestones, module boundaries, inter-module contracts."
  detail: |
    Planner transforms Intake's intent / constraint / context specs into
    a concrete execution plan. It produces:

    - `decision-*` specs (technology / architecture choices)
    - `contract-*` specs (inter-module interfaces — the most important
      spec type for AI-Robin, since Executor only sees contracts, not
      each other's code)
    - `constraint-*` derived from architecture
    - milestones with explicit dependency ordering

    Planner may signal `planning_needs_research` to invoke Researcher
    for factual gaps, re-spawn for sub-planning, or trigger a replan
    on post-review feedback. Owns the `00-robin-plan/` room where
    planning artifacts live.

