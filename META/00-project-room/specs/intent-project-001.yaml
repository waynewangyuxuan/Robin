spec_id: intent-project-001
type: intent
state: active

intent:
  summary: "AI-Robin turns a one-shot human intake into an autonomously-delivered software project via a dispatched multi-agent workflow."
  detail: |
    AI-Robin is a Claude Code plugin providing a kernel + sub-agent orchestration
    for end-to-end software delivery. The user invokes `/robin-start <brief>`;
    the kernel runs Intake (human-facing), then auto-pilots through
    Planning → Scheduling → Execution → Review → Merging → Committing →
    (optional Degrading) → Finalizing.

    AI-Robin is a framework, not a domain expert — it deliberately does not
    embed frontend / backend / devops / business-logic knowledge. Domain
    knowledge attaches via capability packs
    (see decision-pack-as-dependency-001).

