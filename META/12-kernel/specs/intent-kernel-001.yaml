spec_id: intent-kernel-001
type: intent
state: active

intent:
  summary: "Orchestrate the full dispatch loop — Intake → Planning → Scheduling → Executing → Reviewing → Merging → Committing → (Degrading) → Finalizing — by routing sub-agent return signals. Produces no Feature Room specs."
  detail: |
    Kernel is the main agent, loaded by `/robin-start` (new run) or
    `/robin-resume` (resume interrupted run). It does not write
    application code and does not write Feature Room specs. Its
    responsibilities:

    1. Own stage-state (`.ai-robin/stage-state.json`) and session-ledger
       (`.ai-robin/ledger.*`); transition them per dispatch signals.
    2. Dispatch sub-agents per `contracts/dispatch-signal.md` routing.
    3. Enforce autonomy policies from `skills/robin-kernel/discipline.md`
       — iteration budgets, escalation, degradation triggers.

    Kernel is domain-agnostic by construction (see
    decision-kernel-agnostic-001). Nearly all roadmap extensions touch
    kernel wiring.

