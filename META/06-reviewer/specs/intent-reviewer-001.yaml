spec_id: intent-reviewer-001
type: intent
state: active

intent:
  summary: "Evaluate a batch's changed code against a domain-specific checklist; emit a structured verdict."
  detail: |
    Generic review flow shared by all domain reviewers. Loads scope
    (the batch's changes + relevant specs), walks a domain checklist
    from `skills/robin-reviewer/domains/{domain}.md`, and emits a
    `review-verdict` (pass / warn / fail with observations).

    Robin dispatches N Reviewer instances per batch, one per selected
    domain (Review-Planner chooses). Domain checklists are pluggable —
    adding a new domain is a new file in `domains/`, no kernel change.

