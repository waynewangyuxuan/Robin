spec_id: intent-degrader-001
type: intent
state: active

intent:
  summary: "When a scope is abandoned, write the context-degraded-*.yaml narrative and update escalation-notice. Compose the commit message for the degradation commit."
  detail: |
    Degrader activates when the kernel decides to abandon a scope
    (typically iteration-budget exhaustion or unresolvable review
    failure — see `stdlib/degradation-policy.md`).

    Degrader reads original specs + ledger history, composes a
    narrative explaining what was attempted and why it was abandoned,
    writes a `context-degraded-*.yaml` spec, and updates
    `escalation-notice.md` so the user sees the issue at delivery.

    The degradation commit message is also produced here (Committer
    executes). This keeps all degradation-related policy in one place.

